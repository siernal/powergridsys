services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
      POSTGRES_DB: powergrid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d powergrid"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pguser:pgpass@db:5432/powergrid
      SECRET_KEY: change-me-in-production-32chars!!
      ML_MODEL_PATH: /app/ml_models/rf_model.pkl
    volumes:
      - ./backend:/app
      - ml_models:/app/ml_models
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python seed/seed_data.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  pgdata:
  ml_models:
